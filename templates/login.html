{% extends "base.html" %}
{% block title %}OptiTaxi — Acceso{% endblock %}

{% block content %}

<section class="login-page">
  <div class="login-box fade-up">

    <div class="login-logo">
      <img src="{{ url_for('static', filename='img/optiTaxi.png') }}" alt="Logo de OptiTaxi" />
    </div>

    <div class="login-header">
      <p class="login-eyebrow">Panel de control</p>
      <h1 class="login-title">Acceso</h1>
    </div>

    <!-- Mensaje de error (Flask flash o query param) -->
    {% if error %}
    <div class="alert alert-error">
      {{ error }}
    </div>
    {% endif %}

    <form method="POST" action="{{ url_for('login') }}">

      <div class="form-group">
        <label class="form-label" for="usuario">Usuario</label>
        <input
          class="form-input"
          type="text"
          id="usuario"
          name="usuario"
          placeholder="admin"
          autocomplete="username"
          required
        />
      </div>

      <div class="form-group">
        <label class="form-label" for="password">Contraseña</label>
        <input
          class="form-input"
          type="password"
          id="password"
          name="password"
          placeholder="········"
          autocomplete="current-password"
          required
        />
      </div>

      <button type="submit" class="btn btn-primary" style="width:100%; justify-content:center; margin-top:0.5rem;">
        Ingresar &nbsp;→
      </button>

    </form>

    <p class="form-hint">
      Credenciales de demo: <code>admin</code> / <code>1234</code>
    </p>

  </div>
</section>

{% endblock %}
